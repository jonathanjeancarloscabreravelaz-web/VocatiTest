<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VocatiTest - Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Registro de Usuario</h1>
        <p>Por favor, ingresa tus datos para comenzar la prueba.</p>
        
        <form id="registroForm">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
            
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" placeholder="correo@ejemplo.com" required>
            
            <button type="submit" class="btn">INICIAR TEST</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('registroForm');
        form.addEventListener('submit', function(e){
            e.preventDefault();

            const nombre = document.getElementById('nombre').value.trim();
            const email = document.getElementById('email').value.trim();

            if(nombre && email){
                const usuario = { nombre, email };
                localStorage.setItem('usuario', JSON.stringify(usuario));
                localStorage.setItem('respuestas', JSON.stringify([])); // inicializa respuestas
                window.location.href = 'test.html';
            } else {
                alert("Por favor completa todos los campos.");
            }
        });
    </script>
</body>
</html>
